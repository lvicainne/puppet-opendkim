name: Puppet Lint

on:
  push:
    paths:
      - "Gemfile"
      - "Rakefile"
      - "manifests/**/*.pp"
      - "templates/**/*.epp"
      - "types/**/*.pp"
      - "spec/**/*.rb"
      - ".github/workflows/puppet-lint.yml"
  pull_request:
    paths:
      - "Gemfile"
      - "Rakefile"
      - "manifests/**/*.pp"
      - "templates/**/*.epp"
      - "types/**/*.pp"
      - "spec/**/*.rb"
      - ".github/workflows/puppet-lint.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  puppet-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Run puppet-lint
        run: bundle exec rake lint